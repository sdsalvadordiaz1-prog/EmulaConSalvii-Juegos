<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EmulaConSalvii - Final Master 2026</title>
    <style>
        :root { --glow: #00a8ff; --tk-red: #ff0050; --tk-cyan: #00f2ea; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; user-select: none !important; -webkit-user-select: none !important; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden; background: #000814; }
        .shader-bg { position: fixed; inset: -50%; width: 200%; height: 200%; background: conic-gradient(from 180deg at 50% 50%, #000814, #001d3d, #003566, #001d3d, #000814); animation: rotate-shader 15s linear infinite; z-index: -2; filter: blur(60px); opacity: 0.6; }
        @keyframes rotate-shader { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #snowCanvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .alpha-layer { position: fixed; inset: 0; background: black; opacity: 0; pointer-events: none; z-index: 50; transition: 0.8s ease; }
        body.neon-active .alpha-layer { opacity: 0.75; }
        .glass-card { background: rgba(0, 15, 30, 0.5); backdrop-filter: blur(30px); border-radius: 45px; padding: 30px; width: 92%; max-width: 380px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 30px 80px rgba(0,0,0,0.8); position: relative; z-index: 60; }
        .btn-emula { width: 100%; padding: 20px; font-size: 0.95rem; font-weight: 900; color: #000; background: #fff; border: none; border-radius: 25px; transition: 0.3s; text-transform: uppercase; cursor: pointer; box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); margin-top: 15px; }
        #lista-juegos { max-height: 0; opacity: 0; overflow-y: auto; transition: 0.7s ease; scrollbar-width: none; }
        #lista-juegos.abierto { max-height: 330px; opacity: 1; padding-top: 20px; }
        .juego-container { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .juego-fake-link { flex-grow: 1; background: rgba(255,255,255,0.06); color: white; padding: 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; text-align: left; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .btn-copy-pro { background: rgba(0, 168, 255, 0.15); border-radius: 16px; width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(0, 168, 255, 0.3); cursor: pointer; flex-shrink: 0; }
        .btn-copy-pro svg { fill: #00a8ff; width: 20px; height: 20px; }
        .btn-tiktok-footer { display: inline-block; margin-top: 25px; padding: 8px 15px; background: #000; border-radius: 12px; border: 1px solid var(--tk-cyan); box-shadow: -2px 0 0 var(--tk-red), 2px 0 0 var(--tk-cyan); color: #fff; font-size: 0.7rem; font-weight: 900; text-decoration: none; cursor: pointer; }
        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); background: #001220; color: #00a8ff; padding: 16px 40px; border-radius: 50px; font-weight: 900; opacity: 0; transition: 0.4s; z-index: 100000; border: 2px solid #00a8ff; pointer-events: none; }
        #toast.visible { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--glow); }
        input:checked + .slider:before { transform: translateX(22px); }
        #welcomeModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 10000; backdrop-filter: blur(15px); }
        .modal-content { background: rgba(0,20,40,0.95); padding: 40px; border-radius: 45px; width: 88%; max-width: 340px; text-align: center; border: 1px solid #00a8ff; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="shader-bg"></div>
    <canvas id="snowCanvas"></canvas>
    <div class="alpha-layer"></div>

    <div id="welcomeModal">
        <div class="modal-content">
            <h3 style="color:#00a8ff; margin-top:0;">AVISO ONLINE</h3>
            <p style="font-size:0.9rem; opacity:0.8; line-height:1.6;">¡Hola! Esta página está en desarrollo, pero ya puedes descargar los juegos. ¡Bonito día!</p>
            <button onclick="document.getElementById('welcomeModal').style.display='none'" style="width:100%; padding:18px; border-radius:22px; background:#00a8ff; color:white; border:none; font-weight:900; cursor:pointer;">ACEPTAR</button>
        </div>
    </div>

    <div id="toast">¡LINK COPIADO!</div>

    <div class="glass-card">
        <div style="position:absolute; top:20px; left:25px; display:flex; align-items:center; gap:8px;">
            <label class="switch"><input type="checkbox" id="neonToggle"><span class="slider"></span></label>
            <span style="font-size:0.5rem; font-weight:900; opacity:0.4;">ULTRA</span>
        </div>

        <div id="cabecera">
            <div style="margin:20px 0; filter:drop-shadow(0 0 15px #00a8ff);">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#00a8ff" stroke-width="1.2"><path d="M7 6h10a5 5 0 0 1 5 5v2a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5v-2a5 5 0 0 1 5-5z"></path><circle cx="18" cy="9" r="0.5" fill="#00a8ff"></circle><path d="M4.5 11h3M6 9.5v3" stroke-width="1.5"></path></svg>
            </div>
            <h2 style="margin:0; font-size:1.5rem; font-weight:900; text-transform:uppercase;">EmulaConSalvii</h2>
            <p style="opacity:0.4; font-size:0.6rem; font-weight:900; margin-bottom: 20px;">ZONA DE DESCARGAS 2026</p>
        </div>

        <button id="miBoton" class="btn-emula">Archivos de juegos</button>

        <div id="lista-juegos">
            <!-- HALO 1 CE -->
            <div class="juego-container">
                <div class="juego-fake-link" onclick="window.open('https://www.mediafire.com/file/b4g0belnm2ljxmg/J4I0%252BUn0.zip/file', '_blank')">HALO 1 CE</div>
                <div class="btn-copy-pro" onclick="copiarLink('https://www.mediafire.com')">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"></path></svg>
                </div>
            </div>
            <!-- SONIC 2 ABSOLUTE -->
            <div class="juego-container">
                <div class="juego-fake-link" onclick="window.open('https://https://www.mediafire.com/file/ilwlnia0pewspts/Sonic_2.zip/file', '_blank')">SONIC 2 ABSOLUTE</div>
                <div class="btn-copy-pro" onclick="copiarLink('https://www.mediafire.com')">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"></path></svg>
                </div>
            </div>
            <!-- SONIC MANIA -->
            <div class="juego-container">
                <div class="juego-fake-link" onclick="window.open('https://www.mediafire.com/file/532dm6flcnvxe8n/Sonic_Mania.zip/file', '_blank')">SONIC MANIA</div>
                <div class="btn-copy-pro" onclick="copiarLink('https://www.mediafire.com')">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"></path></svg>
                </div>
            </div>
            <!-- CASTLE CRASHERS -->
            <div class="juego-container">
                <div class="juego-fake-link" onclick="window.open('https://www.mediafire.com/file/85eznnxgj4vuobr/CastleCrashers_Opti.zip/file', '_blank')">CASTLE CRASHERS</div>
                <div class="btn-copy-pro" onclick="copiarLink('https://www.mediafire.com')">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"></path></svg>
                </div>
            </div>
        </div>

        <a href="https://www.tiktok.com/@salvii..lite" target="_blank" class="btn-tiktok-footer">MI TIKTOK</a>
    </div>

    <script>
        const btnJuegos = document.getElementById('miBoton');
        const lista = document.getElementById('lista-juegos');
        btnJuegos.onclick = () => lista.classList.toggle('abierto');
        function copiarLink(url) { navigator.clipboard.writeText(url); const toast = document.getElementById('toast'); toast.classList.add('visible'); setTimeout(() => toast.classList.remove('visible'), 2000); }
        document.getElementById('neonToggle').onchange = (e) => { if(e.target.checked) document.body.classList.add('neon-active'); else document.body.classList.remove('neon-active'); };
        const canvas = document.getElementById('snowCanvas'); const ctx = canvas.getContext('2d'); let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; } window.onresize = resize; resize();
        class Particle { constructor() { this.reset(); } reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 2 + 1; this.speed = Math.random() * 1 + 0.5; } update() { this.y += this.speed; if (this.y > canvas.height) this.y = -10; } draw() { ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); } }
        for (let i = 0; i < 40; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); } animate();
    </script>
</body>
</html>
