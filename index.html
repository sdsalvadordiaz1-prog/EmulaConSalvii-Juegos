<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmulaConSalvii - Juegos</title>
    <style>
        /* FONDO ANIMADO MODERNO */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #b21f1f);
            background-size: 400% 400%;
            animation: gradient 12s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden; 
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* TARJETA TIPO CRISTAL (GLASSMORPHISM) */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px;
            width: 85%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            font-size: 3.5rem;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

        h2 { margin: 5px 0; letter-spacing: 1px; }

        /* BOTÓN PRINCIPAL REFORZADO */
        .btn-emula {
            width: 100%;
            padding: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #1a2a6c;
            background: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .btn-emula:active {
            transform: scale(0.95);
            background: #f0f0f0;
        }

        /* LISTA DESPLEGABLE */
        #lista-juegos {
            display: none; /* Se controla por JS */
            margin-top: 20px;
            max-height: 250px; 
            overflow-y: auto; 
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
        }

        /* ESTILO DE LOS LINKS DE MEDIAFIRE */
        .juego-link {
            display: block;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            text-decoration: none;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            font-size: 1rem;
            border-left: 5px solid #fdbb2d;
            text-align: left;
            transition: 0.2s;
        }

        .juego-link:active {
            background: #fdbb2d;
            color: #000;
        }

        #lista-juegos::-webkit-scrollbar { width: 4px; }
        #lista-juegos::-webkit-scrollbar-thumb { background: #fdbb2d; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="logo">🕹️</div>
        <h2>EmulaConSalvii</h2>
        <p style="opacity: 0.7; font-size: 0.9rem;">Descarga tus juegos jugados por Salvii</p>

        <button id="miBoton" class="btn-emula">
            Archivos de juegos de EmulaConSalvii
        </button>

        <div id="lista-juegos">
            <a href="https://www.mediafire.com/file/e0lvczj43epawp3/J4I0+Un0.zip/file" class="juego-link">Halo 1: Combat Evolved</a>
            <a href="https://www.mediafire.com/file/t6ymy5pk6u6e9i1/Sonic+2.zip/file" class="juego-link">Sonic 2 Absolute</a>
            <a href="https://www.mediafire.com/file/ixiq0bntno4asv3/CastleCrashers+Opti.zip/file" class="juego-link">Castle Crashers</a>
            <a href="https://www.mediafire.com/file/9jxcfmxtm30t4ez/Sonic+Mania.zip/file" class="juego-link">Sonic Mania</a>
        </div>
    </div>

    <script>
        const boton = document.getElementById('miBoton');
        const lista = document.getElementById('lista-juegos');

        // Función para abrir la lista visualmente
        function mostrarLista() {
            lista.style.display = 'block';
            boton.innerHTML = 'Cerrar Lista ✖';
            boton.style.color = '#b21f1f';
        }

        // Función para ocultar la lista visualmente
        function ocultarLista() {
            lista.style.display = 'none';
            boton.innerHTML = 'Archivos de juegos de EmulaConSalvii';
            boton.style.color = '#1a2a6c';
        }

        // 1. Al cargar la página, revisamos si la lista debería estar abierta
        const estadoGuardado = localStorage.getItem('menuAbierto');
        if (estadoGuardado === 'true') {
            mostrarLista();
        }

        // 2. Evento del botón para abrir/cerrar y guardar el estado
        boton.addEventListener('click', function() {
            if (lista.style.display === 'none' || lista.style.display === '') {
                mostrarLista();
                localStorage.setItem('menuAbierto', 'true');
            } else {
                ocultarLista();
                localStorage.setItem('menuAbierto', 'false');
            }
        });
    </script>

</body>
</html>
